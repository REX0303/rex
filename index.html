<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Mobile</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #fff;
        font-family: Arial;
    }

    canvas {
        display: block;
        background: #fff;
    }

    #jumpBtn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: none;
        background: black;
        color: white;
        font-size: 16px;
        opacity: 0.7;
    }

    /* Ranking */
    #leaderboard {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px;
        border-radius: 10px;
        font-size: 14px;
    }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<button id="jumpBtn">SALTAR</button>

<div id="leaderboard">
    <b>🏆 Top 5</b>
    <ol id="scores"></ol>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ground = canvas.height - 60;

let dino = {
    x: 50,
    y: ground - 40,
    width: 40,
    height: 40,
    velocity: 0,
    jumping: false
};

let obstacles = [];
let score = 0;
let gameOver = false;

const gravity = 1.2;

// 📊 Obtener ranking
function getScores() {
    return JSON.parse(localStorage.getItem("dinoScores")) || [];
}

// 💾 Guardar score
function saveScore(newScore) {
    let scores = getScores();
    scores.push(newScore);
    scores.sort((a, b) => b - a);
    scores = scores.slice(0, 5);
    localStorage.setItem("dinoScores", JSON.stringify(scores));
}

// 🖥 Mostrar ranking
function renderScores() {
    let scores = getScores();
    let list = document.getElementById("scores");
    list.innerHTML = "";

    scores.forEach(s => {
        let li = document.createElement("li");
        li.textContent = s;
        list.appendChild(li);
    });
}

// Crear obstáculo
function createObstacle() {
    obstacles.push({
        x: canvas.width,
        y: ground - 40,
        width: 20,
        height: 40
    });
}

function update() {
    if (gameOver) return;

    if (dino.jumping) {
        dino.velocity += gravity;
        dino.y += dino.velocity;

        if (dino.y >= ground - dino.height) {
            dino.y = ground - dino.height;
            dino.jumping = false;
            dino.velocity = 0;
        }
    }

    obstacles.forEach((obs, i) => {
        obs.x -= 6;

        if (obs.x < -20) {
            obstacles.splice(i, 1);
            score++;
        }
    });

    if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 300) {
        createObstacle();
    }

    obstacles.forEach(obs => {
        if (
            dino.x < obs.x + obs.width &&
            dino.x + dino.width > obs.x &&
            dino.y < obs.y + obs.height &&
            dino.y + dino.height > obs.y
        ) {
            gameOver = true;
            saveScore(score);
            renderScores();
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillRect(0, ground, canvas.width, 2);

    ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

    obstacles.forEach(obs => {
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
    });

    ctx.fillText("Score: " + score, canvas.width - 100, 30);

    if (gameOver) {
        ctx.fillText("GAME OVER", canvas.width / 2 - 50, canvas.height / 2);
    }
}

// Saltar
function jump() {
    if (!dino.jumping && !gameOver) {
        dino.jumping = true;
        dino.velocity = -18;
    } else if (gameOver) {
        resetGame();
    }
}

document.getElementById("jumpBtn").addEventListener("click", jump);

function resetGame() {
    dino.y = ground - dino.height;
    dino.velocity = 0;
    dino.jumping = false;
    obstacles = [];
    score = 0;
    gameOver = false;
    update();
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ground = canvas.height - 60;
});

// Inicializar ranking
renderScores();

// Iniciar juego
update();
</script>

</body>
</html>
